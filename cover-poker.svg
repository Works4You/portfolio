<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="pg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1a3a"/>
      <stop offset="0.55" stop-color="#12244f"/>
      <stop offset="1" stop-color="#0a1428"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.35" r="0.6">
      <stop offset="0" stop-color="#2e5496" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2e5496" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7d98b"/>
      <stop offset="1" stop-color="#c99a3b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#pg)"/>
  <rect width="1200" height="400" fill="url(#glow)"/>
  <g stroke="#3d63a8" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 90 H1200 M0 180 H1200 M0 270 H1200 M0 360 H1200"/>
    <path d="M150 0 V400 M350 0 V400 M550 0 V400 M750 0 V400 M950 0 V400 M1120 0 V400"/>
  </g>
  <!-- stacked chips -->
  <g transform="translate(250 250)">
    <ellipse cx="0" cy="40" rx="120" ry="34" fill="#0e1e42"/>
    <ellipse cx="0" cy="24" rx="120" ry="34" fill="#16305f"/>
    <ellipse cx="0" cy="8" rx="120" ry="34" fill="#1c3c73"/>
    <ellipse cx="0" cy="-8" rx="120" ry="34" fill="#24488a"/>
    <ellipse cx="0" cy="-8" rx="70" ry="20" fill="none" stroke="url(#gold)" stroke-width="3" stroke-opacity="0.8"/>
  </g>
  <!-- playing card -->
  <g transform="translate(760 120) rotate(-12)">
    <rect x="0" y="0" width="180" height="250" rx="18" fill="#f4f6fb"/>
    <rect x="0" y="0" width="180" height="250" rx="18" fill="none" stroke="#c99a3b" stroke-opacity="0.5" stroke-width="2"/>
    <path d="M90 60 C90 60 60 90 60 118 a30 30 0 0 0 60 0 C120 90 90 60 90 60 Z" fill="#12244f"/>
    <rect x="86" y="150" width="8" height="45" fill="#12244f"/>
    <path d="M70 195 h40 l-10 22 h-20 z" fill="#12244f"/>
    <text x="20" y="42" font-family="Georgia, serif" font-size="34" fill="#12244f">A</text>
  </g>
  <g transform="translate(700 150) rotate(6)">
    <rect x="0" y="0" width="180" height="250" rx="18" fill="#e9edf6" opacity="0.85"/>
  </g>
</svg>
