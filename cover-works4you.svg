<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081226"/>
      <stop offset="0.5" stop-color="#0f2450"/>
      <stop offset="1" stop-color="#0a1a3a"/>
    </linearGradient>
    <radialGradient id="wglow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#3aa0ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#3aa0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#wg)"/>
  <rect width="1200" height="400" fill="url(#wglow)"/>
  <!-- signal waves -->
  <g fill="none" stroke="#4aa8ff" stroke-opacity="0.35">
    <circle cx="250" cy="200" r="60" stroke-width="2"/>
    <circle cx="250" cy="200" r="110" stroke-width="1.5" stroke-opacity="0.22"/>
    <circle cx="250" cy="200" r="160" stroke-width="1" stroke-opacity="0.14"/>
  </g>
  <!-- network of nodes -->
  <g fill="none" stroke="#5fb0ff" stroke-opacity="0.5" stroke-width="1.5">
    <path d="M250 200 L470 110 L700 180 L900 90 L1050 210 M470 110 L520 300 M700 180 L760 320 M900 90 L1060 60 M700 180 L950 260 M520 300 L760 320"/>
  </g>
  <g fill="#8fd0ff">
    <circle cx="470" cy="110" r="7"/>
    <circle cx="700" cy="180" r="9"/>
    <circle cx="900" cy="90" r="7"/>
    <circle cx="1050" cy="210" r="6"/>
    <circle cx="520" cy="300" r="6"/>
    <circle cx="760" cy="320" r="7"/>
    <circle cx="1060" cy="60" r="5"/>
    <circle cx="950" cy="260" r="6"/>
  </g>
  <!-- origin signal node -->
  <circle cx="250" cy="200" r="14" fill="#eaf5ff"/>
  <circle cx="250" cy="200" r="14" fill="none" stroke="#4aa8ff" stroke-width="3">
    <animate attributeName="r" values="14;22;14" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.9;0;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
