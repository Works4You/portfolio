<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="tw-dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161616"/>
      <stop offset="1" stop-color="#2b2b2b"/>
    </linearGradient>
    <linearGradient id="tw-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f4ef"/>
      <stop offset="1" stop-color="#e6e1d6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#tw-light)"/>
  <path d="M0 0 L720 0 L560 400 L0 400 Z" fill="url(#tw-dark)"/>
  <!-- diagonal seam highlight -->
  <path d="M720 0 L560 400" stroke="#c9a24b" stroke-width="2" stroke-opacity="0.55"/>
  <!-- minimal garment / hanger line art, straddling the seam -->
  <g stroke-linecap="round" fill="none">
    <!-- hanger on dark side -->
    <g transform="translate(300 120)" stroke="#f6f4ef" stroke-opacity="0.85" stroke-width="4">
      <circle cx="0" cy="0" r="10"/>
      <path d="M0 10 L0 34"/>
      <path d="M0 34 L-120 120 M0 34 L120 120"/>
      <path d="M-120 120 Q0 175 120 120"/>
    </g>
    <!-- garment silhouette on light side -->
    <g transform="translate(880 110)" stroke="#1c1c1c" stroke-opacity="0.8" stroke-width="4">
      <path d="M-70 20 L-30 0 L30 0 L70 20 L48 60 L48 200 L-48 200 L-48 60 Z"/>
      <path d="M-30 0 Q0 34 30 0"/>
    </g>
  </g>
  <!-- two-tone dots motif -->
  <g transform="translate(1050 310)">
    <circle cx="0" cy="0" r="16" fill="#161616"/>
    <circle cx="42" cy="0" r="16" fill="none" stroke="#161616" stroke-width="3"/>
  </g>
</svg>
